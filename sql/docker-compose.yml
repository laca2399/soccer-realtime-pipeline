version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: soccer-postgres
    environment:
      POSTGRES_USER: soccer
      POSTGRES_PASSWORD: soccer
      POSTGRES_DB: soccer_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
